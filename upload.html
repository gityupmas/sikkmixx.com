<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Upload Track - SikkMixx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(255, 0, 200, 0.3);
      text-align: center;
    }

    input[type="file"] {
      margin: 20px 0;
    }
	
  input[type="text"], select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #111;
  color: white;
  margin: 10px 0;
  font-size: 14px;
  box-sizing: border-box;
}

select option {
  background: #111;
}

.tag-hint {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin: -6px 0 8px;
  text-align: left;
}


    button {
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #ff00cc, #3333ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    a {
      color: #ff00cc;
      text-decoration: none;
      display: block;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>🎧 Upload Your MP3</h2>

    <form id="uploadForm">
      <input type="text" id="artistInput" name="artist" placeholder="Artist (optional)">
      <div class="tag-hint" id="tag-hint" style="display:none;">Tags auto-filled from file</div>

      <select id="genreSelect" name="genre">
        <option value="">Genre (optional)</option>
        <option>House</option>
        <option>Deep House</option>
        <option>Tech House</option>
        <option>Indie Dance</option>
        <option>Techno</option>
        <option>Trance</option>
        <option>Drum & Bass</option>
        <option>Jungle</option>
        <option>Dubstep</option>
        <option>Hip-Hop</option>
        <option>Afrobeats</option>
        <option>Reggae</option>
        <option>Latin</option>
        <option>Pop</option>
        <option>Electronic</option>
        <option>Ambient</option>
        <option>Other</option>
      </select>

      <input type="file" id="fileInput" name="file" accept=".mp3,.m4a,.wav,.ogg,.flac" required>
      <br>
      <button type="submit">Upload Track</button>
    </form>

    <div id="status"></div>

    <a href="/">← Back to Home</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script>

  document.getElementById("fileInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    jsmediatags.read(file, {
      onSuccess: function (tag) {
        const tags = tag.tags;
        const hint = document.getElementById("tag-hint");
        let filled = false;

        if (tags.artist) {
          document.getElementById("artistInput").value = tags.artist;
          filled = true;
        }

        if (tags.genre) {
          const genreSelect = document.getElementById("genreSelect");
          const normalized = tags.genre.trim();
          // Try to match against existing options
          const match = Array.from(genreSelect.options).find(
            o => o.value.toLowerCase() === normalized.toLowerCase()
          );
          if (match) {
            genreSelect.value = match.value;
          } else {
            // Add it as a new option and select it
            const opt = document.createElement("option");
            opt.value = normalized;
            opt.textContent = normalized;
            genreSelect.appendChild(opt);
            genreSelect.value = normalized;
          }
          filled = true;
        }

        hint.style.display = filled ? "block" : "none";
      },
      onError: function () {
        // No tags — that's fine, user fills in manually
      }
    });
  });

    const form = document.getElementById("uploadForm");
    const statusDiv = document.getElementById("status");
	const token = localStorage.getItem("token");
       if (!token) window.location.href = "/login.html";
// added above to block direct to upload	   

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(form);
  const token = localStorage.getItem("token");
  statusDiv.textContent = "Uploading...";

  try {
    const response = await fetch("https://api.sikkmixx.com/upload", {
      method: "POST",
      body: formData,
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    if (response.ok) {
      const data = await response.json(); // parse JSON safely
      statusDiv.textContent = "✅ Upload successful!";
      form.reset();
    } else {
      const text = await response.text();
      statusDiv.textContent = "❌ Error: " + text;
    }

  } catch (err) {
    statusDiv.textContent = "❌ Upload failed. " + err.message;
  }
});
	
  </script>
</body>
</html>
