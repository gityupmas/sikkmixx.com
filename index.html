.deck {

.disc {
  position: relative;
  width: 46%;
  aspect-ratio: 1/1;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
  background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.14), transparent 52%),

}

.disc.left  { transform: translateX(12%); z-index:2; }

.spin {

  height: 100%;

}

.base {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  color: rgba(255,255,255,.9);

}

/* Move base words closer to the hot letters */
.disc.left .base  { transform: translate(-50%, -50%) translateX(25%); }
.disc.right .base { transform: translate(-50%, -50%) translateX(-25%); }

/* Big rim letters */
.rim {
  position: absolute;
  top: 50%;
  left: 50%;

  font-size: clamp(70px, 12vw, 140px); /* slightly bigger */

<script>
const API = "https://api.sikkmixx.com"
let player = document.getElementById("player")
let playlist = []
let currentIndex = 0
let bassSmoothed = 0
let currentTrack = null;
let currentUser = null;
let playCountedId = null;

// Stable session ID per tab
let sessionId = sessionStorage.getItem("session_id");
if (!sessionId) {
  sessionId = crypto.randomUUID();
  sessionStorage.setItem("session_id", sessionId);
}

let heartbeatInterval = null;
let pollInterval = null;
let myVotes = new Set();

async function fetchMyVotes() {
  if (!token) return;
  try {
    const res = await fetch(`${API}/my-votes`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    if (res.ok) {
      const ids = await res.json();
      myVotes = new Set(ids);
      updateVoteBtn();
    }
  } catch {}
}

function updateVoteBtn() {
  const btn = document.getElementById("vote-btn");
  const countEl = document.getElementById("vote-count");
  if (!currentTrack) return;

  countEl.textContent = currentTrack.vote_count || 0;

  if (!currentUser) {
    btn.disabled = true;
    btn.classList.remove("voted");
    btn.title = "Login to upvote";
    return;
  }

  btn.disabled = false;
  if (myVotes.has(currentTrack.id)) {
    btn.classList.add("voted");
  } else {
    btn.classList.remove("voted");
  }
}

document.getElementById("vote-btn").addEventListener("click", async () => {
  if (!currentTrack || !currentUser) return;

  try {
    const res = await fetch(`${API}/vote`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ track_id: currentTrack.id })
    });

    if (!res.ok) return;
    const data = await res.json();

    if (data.voted) {
      myVotes.add(currentTrack.id);
      currentTrack.vote_count = (currentTrack.vote_count || 0) + 1;
    } else {
      myVotes.delete(currentTrack.id);
      currentTrack.vote_count = Math.max(0, (currentTrack.vote_count || 0) - 1);
    }

    updateVoteBtn();
  } catch {}
});

function getTrackLabel(track) {
  if (!track) return "";
  const title = (track.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "");
  const artist = (track.artist || "").trim();
  return artist ? `${artist} — ${title}` : title;
}

async function sendHeartbeat() {
  if (!currentTrack) return;
  try {
    await fetch(`${API}/listening`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: currentUser ? `user_${currentUser.id}` : sessionId,
        username: currentUser ? `@${currentUser.username}` : "Guest",
        track_name: getTrackLabel(currentTrack)
      })
    });
  } catch {}
}

async function pollListeners() {
  try {
    const res = await fetch(`${API}/listeners`);
    if (!res.ok) return;
    const listeners = await res.json();

    const list = document.getElementById("listeners-list");
    const info = document.getElementById("now-playing-info");

    if (listeners.length === 0) {
      info.style.display = "none";
      return;
    }

    list.innerHTML = listeners.map(l => `
      <div class="listener-row">
        <span class="listener-name">${l.username}</span>
        <span class="listener-track">${l.track_name}</span>
      </div>
    `).join("");

    info.style.display = "block";
  } catch {}
}

function startPresence() {
  if (heartbeatInterval) return; // already running
  sendHeartbeat();
  pollListeners();
  heartbeatInterval = setInterval(sendHeartbeat, 15000);
  pollInterval = setInterval(pollListeners, 15000);
}


const token = localStorage.getItem("token");

const registerBtn = document.getElementById("registerBtn");
const loginBtn = document.getElementById("loginBtn");
const profileBtn = document.getElementById("profileBtn");

(async () => {

  if (!token) return; // Not logged in → do nothing

  try {
    const meRes = await fetch(`${API}/me`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (!meRes.ok) {
      localStorage.removeItem("token");
      return;
    }

    const me = await meRes.json();

    // Hide Register
    registerBtn.style.display = "none";

    // Change Login → Logout
	loginBtn.style.borderColor = "rgba(255,80,80,0.6)";
loginBtn.style.color = "rgba(255,180,180,0.9)";

    loginBtn.textContent = "Logout";
    loginBtn.href = "#";

    loginBtn.addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("token");
      window.location.reload();
    });

    // Show profile button with username
    profileBtn.textContent = `@${me.username}`;
    profileBtn.style.display = "inline-block";

    currentUser = me;
    sendHeartbeat();
    fetchMyVotes();

  } catch (e) {
    localStorage.removeItem("token");
  }

})();



(async () => {

function buildRightPanel() {
  buildRankedList("most-played-list", "play_count");

function buildRankedList(containerId, sortKey) {
  const container = document.getElementById(containerId);

  const ranked = playlist
    .map((track, i) => ({ track, i }))
    .filter(({ track }) => (track[sortKey] || 0) > 0)
    .sort((a, b) => (b.track[sortKey] || 0) - (a.track[sortKey] || 0))
    .slice(0, 5);

  if (ranked.length === 0) {
    container.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.25);padding:4px 0;">None yet</div>`;
    return;
  }

  container.innerHTML = ranked.map(({ track, i }) => {
    const title = (track.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "");
    const artist = (track.artist || "").trim();
    const label = artist ? `${artist} — ${title}` : title;
    const val = track[sortKey] || 0;
    const icon = sortKey === "play_count" ? "▶" : "♥";
    return `
      <div class="recent-item" data-index="${i}">
        <div class="recent-title">${label}</div>
        <div class="recent-meta">${icon} ${val}</div>
      </div>`;
  }).join("");

  container.querySelectorAll(".recent-item").forEach(el => {
    el.addEventListener("click", () => {
      currentIndex = parseInt(el.dataset.index);
      playCurrentTrack();
      player.play();
      updateRecentActive();
    });
  });
}

const popup = document.getElementById("submitter-popup");

function showSubmitterPopup(username, anchorEl) {
  const tracks = playlist.filter(t => t.username === username);
  if (tracks.length === 0) return;

  const rect = anchorEl.getBoundingClientRect();

  popup.innerHTML = `
    <div class="popup-name">@${username}</div>
    ${tracks.map(t => {
      const title = (t.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "");
      const artist = (t.artist || "").trim();
      return `<div class="popup-track">${artist ? `${artist} — ${title}` : title}</div>`;
    }).join("")}
  `;

  // Position to the right of the panel
  popup.style.left = `${rect.right + 10}px`;
  popup.style.top = `${rect.top}px`;
  popup.style.display = "block";
}

function hideSubmitterPopup() {
  popup.style.display = "none";
}

async function buildSubmitters() {
  try {
    const res = await fetch(`${API}/top-submitters`);
    if (!res.ok) return;
    const submitters = await res.json();
    const container = document.getElementById("submitters-list");

    if (submitters.length === 0) {
      container.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.25);padding:4px 0;">None yet</div>`;
      return;
    }

    container.innerHTML = submitters.map(s => `
      <div class="recent-item submitter-row" data-username="${s.username}" style="cursor:default;">
        <div class="recent-title">@${s.username}</div>
        <div class="recent-meta">🎵 ${s.track_count} track${s.track_count !== 1 ? "s" : ""}</div>
      </div>
    `).join("");

    container.querySelectorAll(".submitter-row").forEach(el => {
      el.addEventListener("mouseenter", () => showSubmitterPopup(el.dataset.username, el));
      el.addEventListener("mouseleave", hideSubmitterPopup);
    });
  } catch {}
}

function buildRecentPanel() {
  const list = document.getElementById("recent-list");
  const recent = playlist.slice(0, 5);

  list.innerHTML = recent.map((track, i) => {
    const title = (track.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "");
    const artist = (track.artist || "").trim();
    const label = artist ? `${artist} — ${title}` : title;
    const votes = track.vote_count || 0;
    const plays = track.play_count || 0;
    return `
      <div class="recent-item" data-index="${i}">
        <div class="recent-title">${label}</div>
        <div class="recent-meta">♥ ${votes} &nbsp;·&nbsp; ▶ ${plays}</div>
      </div>`;
  }).join("");

  list.querySelectorAll(".recent-item").forEach(el => {
    el.addEventListener("click", () => {
      currentIndex = parseInt(el.dataset.index);
      playCurrentTrack();
      player.play();
      updateRecentActive();
    });
  });

  updateRecentActive();
}

function updateRecentActive() {
  document.querySelectorAll(".recent-item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.index) === currentIndex);
  });
}


async function loadTrack() {
  const res = await fetch(`${API}/public-tracks`)
  playlist = await res.json()

  if (playlist.length === 0) {
    document.getElementById("trackTitle").innerText = "No live track yet"
    return
  }

  // 🔀 Start randomly
  currentIndex = Math.floor(Math.random() * playlist.length)

  buildRecentPanel()
  buildRightPanel()
  buildSubmitters()
  playCurrentTrack()
}
loadTrack()



function playCurrentTrack() {
  const track = playlist[currentIndex];
  currentTrack = track;

  const encoded = encodeURIComponent(track.filename);
const title = (track.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "");
const artist = (track.artist || "").trim();

document.getElementById("trackTitle").innerText =
  artist ? `${artist} — ${title}` : title;



  player.src = `${API}/file/${encoded}`;
  playCountedId = null;
  document.getElementById("up-next").style.display = "none";
  sendHeartbeat();
  updateVoteBtn();
  updateRecentActive();
}



player.addEventListener("timeupdate", () => {
  if (!player.duration || playlist.length < 2) return;

  const remaining = player.duration - player.currentTime;
  const upNextEl = document.getElementById("up-next");
  const upNextTitle = document.getElementById("up-next-title");

  if (remaining <= 60 && remaining > 0) {
    const nextIndex = (currentIndex + 1) % playlist.length;
    const next = playlist[nextIndex];
    const title = (next.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "");
    const artist = (next.artist || "").trim();
    upNextTitle.textContent = artist ? `${artist} — ${title}` : title;
    upNextEl.style.display = "block";

    if (currentTrack?.id && playCountedId !== currentTrack.id) {
      playCountedId = currentTrack.id;
      fetch(`${API}/track-played`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: currentTrack.id })
      }).catch(() => {});
    }
  } else {
    upNextEl.style.display = "none";
  }
});

player.addEventListener("ended", async () => {
  if (playlist.length === 0) return;

  // Move to next track
  currentIndex++;
  if (currentIndex >= playlist.length) currentIndex = 0;

  playCurrentTrack();
  player.play();
});



document.getElementById("nextBtn").addEventListener("click", () => {

  if (playlist.length === 0) return

  currentIndex++
  if (currentIndex >= playlist.length) currentIndex = 0

  playCurrentTrack()
  player.play()
})

document.getElementById("prevBtn").addEventListener("click", () => {

  if (playlist.length === 0) return

  currentIndex--
  if (currentIndex < 0) currentIndex = playlist.length - 1

  playCurrentTrack()
  player.play()
})

document.getElementById("playPauseBtn").addEventListener("click", () => {

  if (player.paused) {
    player.play()
  } else {
    player.pause()
  }

})





// ENTER BUTTON LOGIC
document.getElementById("enterBtn").addEventListener("click", async () => {

  if (!audioContext) {
    initVisualizer()
  }

  await audioContext.resume()
  player.play()

  startPresence()

  document.getElementById("intro").style.opacity = 0
  setTimeout(() => {

    document.getElementById("main").style.opacity = 1
  }, 1000)
})

const canvas = document.getElementById("visualizer")
const ctx = canvas.getContext("2d")

canvas.width = canvas.offsetWidth
canvas.height = canvas.offsetHeight

let audioContext
let analyser
let source
let dataArray


function initVisualizer() {

  audioContext = new (window.AudioContext || window.webkitAudioContext)()
  analyser = audioContext.createAnalyser()

  analyser.fftSize = 256          // better resolution
  analyser.smoothingTimeConstant = 0.8  // smoother motion

  source = audioContext.createMediaElementSource(player)
  source.connect(analyser)
  analyser.connect(audioContext.destination)

  const bufferLength = analyser.frequencyBinCount
  dataArray = new Uint8Array(bufferLength)

  function draw() {
    requestAnimationFrame(draw)

    analyser.getByteFrequencyData(dataArray)

    ctx.clearRect(0, 0, canvas.width, canvas.height)

    const bars = 32
    const step = Math.floor(bufferLength / bars)
    const barWidth = canvas.width / bars



//            🎵 BASS DETECTION (first few frequency bins)
let bassSum = 0
for (let i = 0; i < 8; i++) {
  bassSum += dataArray[i]
}
let bass = bassSum / 8

// smooth it
bassSmoothed = bassSmoothed * 0.8 + bass * 0.2

let bassNormalized = bassSmoothed / 255


//           🔥 BACKGROUND REACTION
const bg = document.getElementById("visual-bg")

document.body.style.transform = `scale(${1 + bassNormalized * 0.02})`


let hueShift = 280 - (bassNormalized * 90)
let brightness = 8 + (bassNormalized * 35)

bg.style.background = `
  radial-gradient(circle at center,
    hsla(${hueShift}, 100%, ${brightness}%, 0.5),
    rgba(0,0,0,0.8))
`

for (let i = 0; i < bars; i++) {

  let sum = 0
  for (let j = 0; j < step; j++) {
    sum += dataArray[i * step + j]
  }

  let value = sum / step

  // normalize + compress
  let normalized = value / 255
  let scaled = Math.pow(normalized, 1.5) * canvas.height

  const x = i * barWidth
  const y = canvas.height - scaled

  // 🎨 COLOR SHIFT BASED ON INTENSITY
  let hue = 280 - (normalized * 200)   // purple → blue
  let brightness = 50 + (normalized * 50)

  ctx.fillStyle = `hsl(${hue}, 100%, ${brightness}%)`
  ctx.shadowBlur = 25
  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`

  ctx.fillRect(x, y, barWidth - 3, scaled)
}
  }

}

<script>
let logoPlaying = true;
const SPEED = 44;
const spinLeft  = () => document.getElementById("spinLeft");
const spinRight = () => document.getElementById("spinRight");

const t0 = performance.now();

function tick(now){
  if(!logoPlaying) return;

  const dt = (now - t0)/1000;
  const aRight = dt * SPEED;
  const aLeft  = -dt * SPEED;

  if(spinRight()) spinRight().style.transform = `rotate(${aRight}deg)`;
  if(spinLeft())  spinLeft().style.transform  = `rotate(${aLeft}deg)`;

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
