<!DOCTYPE html>
<html>
<head>
  <title>SiKKMiXX — DJ Booth + Spotify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      overflow: hidden;
      height: 100vh;
      transition: transform 0.1s linear;
    }

    /* ── Header buttons ── */
    .header-btn {
      position: fixed;
      top: 10px;
      opacity: 0.5;
      font-size: 14px;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 12px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      transition: all 0.3s ease;
      z-index: 20;
    }
    .header-btn:hover {
      color: #ff00cc;
      opacity: 1;
      border-color: #ff00cc;
      box-shadow: 0 0 10px #ff00cc;
    }
    #backBtn  { left: 15px; }
    #backBtn:hover { color: #00e0ff; border-color: #00e0ff; box-shadow: 0 0 10px #00e0ff; }
    #profileBtn { left: 100px; }
    #logoutBtn  { right: 15px; color: rgba(255,150,150,0.8); border-color: rgba(255,80,80,0.4); }
    #logoutBtn:hover { color: #ff6060; border-color: #ff6060; box-shadow: 0 0 10px rgba(255,80,80,0.5); }

    /* ── Backgrounds ── */
    #bg-image {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url("omnia.webp") center center / cover no-repeat;
      z-index: -2; filter: brightness(0.5) contrast(1.4);
    }
    #visual-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: radial-gradient(circle at center, #111 0%, #000 80%);
      transition: background 0.2s ease;
    }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 46px 10px 8px;
      gap: 6px;
    }

    /* ── Decks row ── */
    .decks-row {
      display: flex;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .deck-panel {
      flex: 1;
      background: rgba(18, 18, 18, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 14px;
      padding: 11px 13px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }
    .deck-panel.deck-a {
      border: 1px solid rgba(255, 0, 204, 0.35);
      box-shadow: 0 0 24px rgba(255,0,204,0.08);
    }
    .deck-panel.deck-b {
      border: 1px solid rgba(0, 224, 255, 0.35);
      box-shadow: 0 0 24px rgba(0,224,255,0.08);
    }

    .deck-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase; font-weight: 700;
    }
    .deck-a .deck-label { color: #ff00cc; text-shadow: 0 0 8px rgba(255,0,204,0.7); }
    .deck-b .deck-label { color: #00e0ff; text-shadow: 0 0 8px rgba(0,224,255,0.7); }

    .deck-track-title {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-height: 16px;
    }

    .deck-visualizer {
      width: 100%; height: 36px; flex-shrink: 0; border-radius: 6px;
      display: block;
    }

    /* ── Waveform ── */
    .deck-waveform {
      width: 100%; height: 80px; flex-shrink: 0; border-radius: 6px;
      display: block; cursor: crosshair;
    }
    .deck-a .deck-waveform { border: 1px solid rgba(255,0,204,0.12); }
    .deck-b .deck-waveform { border: 1px solid rgba(0,224,255,0.12); }

    /* ── BPM ── */
    .deck-header-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .deck-bpm {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      transition: color 0.3s;
    }
    .deck-a .deck-bpm { color: rgba(255,0,204,0.85); }
    .deck-b .deck-bpm { color: rgba(0,224,255,0.85); }
    .deck-a .deck-bpm.beat { color: #ff00cc; text-shadow: 0 0 14px #ff00cc, 0 0 4px #fff; }
    .deck-b .deck-bpm.beat { color: #00e0ff; text-shadow: 0 0 14px #00e0ff, 0 0 4px #fff; }

    .deck-controls {
      display: flex; align-items: center; gap: 6px;
    }

    .ctrl-btn {
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.85); cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0;
    }

    /* Skip buttons */
    .ctrl-btn.skip-btn {
      width: 36px; height: 36px; font-size: 14px;
      letter-spacing: -1px;
    }
    .deck-a .ctrl-btn.skip-btn:hover {
      border-color: #ff00cc; color: #ff00cc;
      box-shadow: 0 0 10px rgba(255,0,204,0.45);
      transform: scale(1.1);
    }
    .deck-b .ctrl-btn.skip-btn:hover {
      border-color: #00e0ff; color: #00e0ff;
      box-shadow: 0 0 10px rgba(0,224,255,0.45);
      transform: scale(1.1);
    }

    /* Play button — larger, accent-tinted */
    .ctrl-btn.play-btn {
      width: 52px; height: 52px; font-size: 20px;
    }
    .deck-a .ctrl-btn.play-btn {
      background: rgba(255,0,204,0.15);
      border: 1.5px solid rgba(255,0,204,0.55);
      color: #ff00cc;
      box-shadow: 0 0 12px rgba(255,0,204,0.25);
    }
    .deck-b .ctrl-btn.play-btn {
      background: rgba(0,224,255,0.15);
      border: 1.5px solid rgba(0,224,255,0.55);
      color: #00e0ff;
      box-shadow: 0 0 12px rgba(0,224,255,0.25);
    }
    .deck-a .ctrl-btn.play-btn:hover {
      background: rgba(255,0,204,0.28);
      border-color: #ff00cc;
      box-shadow: 0 0 22px rgba(255,0,204,0.6);
      transform: scale(1.08);
    }
    .deck-b .ctrl-btn.play-btn:hover {
      background: rgba(0,224,255,0.28);
      border-color: #00e0ff;
      box-shadow: 0 0 22px rgba(0,224,255,0.6);
      transform: scale(1.08);
    }

    /* Playing state — pulsing glow ring */
    .deck-a .ctrl-btn.play-btn.is-playing {
      background: rgba(255,0,204,0.22);
      border-color: #ff00cc;
      animation: pulse-a 1.8s ease-in-out infinite;
    }
    .deck-b .ctrl-btn.play-btn.is-playing {
      background: rgba(0,224,255,0.22);
      border-color: #00e0ff;
      animation: pulse-b 1.8s ease-in-out infinite;
    }
    @keyframes pulse-a {
      0%, 100% { box-shadow: 0 0 10px rgba(255,0,204,0.4); }
      50%       { box-shadow: 0 0 28px rgba(255,0,204,0.85), 0 0 6px rgba(255,0,204,0.4) inset; }
    }
    @keyframes pulse-b {
      0%, 100% { box-shadow: 0 0 10px rgba(0,224,255,0.4); }
      50%       { box-shadow: 0 0 28px rgba(0,224,255,0.85), 0 0 6px rgba(0,224,255,0.4) inset; }
    }

    .vote-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.6);
      border-radius: 14px; padding: 3px 10px;
      font-size: 11px; cursor: pointer; transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .deck-a .vote-btn:hover, .deck-a .vote-btn.voted {
      border-color: #ff00cc; color: #ff00cc; box-shadow: 0 0 8px rgba(255,0,204,0.4);
    }
    .deck-b .vote-btn:hover, .deck-b .vote-btn.voted {
      border-color: #00e0ff; color: #00e0ff; box-shadow: 0 0 8px rgba(0,224,255,0.4);
    }
    .vote-btn:disabled { cursor: default; opacity: 0.5; }

    /* ── Sliders ── */
    .slider-section {
      display: flex; flex-direction: column; gap: 3px;
      flex: 1; min-height: 0; justify-content: center;
    }
    .slider-row {
      display: flex; align-items: center; gap: 7px;
    }
    .slider-label {
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); width: 40px; flex-shrink: 0; text-align: right;
    }
    .slider-val {
      font-size: 9px; color: rgba(255,255,255,0.35);
      width: 36px; flex-shrink: 0; text-align: left;
    }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.12);
      outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      cursor: pointer; transition: box-shadow 0.2s ease;
    }
    .deck-a input[type="range"]::-webkit-slider-thumb {
      background: #ff00cc; box-shadow: 0 0 6px rgba(255,0,204,0.7);
    }
    .deck-b input[type="range"]::-webkit-slider-thumb {
      background: #00e0ff; box-shadow: 0 0 6px rgba(0,224,255,0.7);
    }

    /* ── Crossfader ── */
    .crossfader-row {
      display: flex; align-items: center; gap: 12px;
      padding: 5px 14px;
      background: rgba(15,15,15,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      flex-shrink: 0;
    }
    .xf-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      font-weight: 700; flex-shrink: 0;
    }
    .xf-label.a { color: rgba(255,0,204,0.8); }
    .xf-label.b { color: rgba(0,224,255,0.8); }
    .xf-label.center {
      font-size: 8px; letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
    }
    #crossfader {
      flex: 1;
      background: linear-gradient(to right, rgba(255,0,204,0.3), rgba(255,255,255,0.1) 50%, rgba(0,224,255,0.3));
    }
    #crossfader::-webkit-slider-thumb {
      background: white;
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      width: 16px; height: 16px;
    }

    /* ── Library ── */
    .library-row {
      background: rgba(12,12,12,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 7px 12px;
      flex-shrink: 0;
      height: 130px;
      display: flex;
      flex-direction: column;
    }
    .library-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 5px; flex-shrink: 0;
    }
    .library-title {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.25); flex-shrink: 0;
    }
    #library-search {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white; font-size: 11px;
      padding: 3px 8px; outline: none;
      width: 160px;
    }
    #library-search::placeholder { color: rgba(255,255,255,0.2); }
    #library-search:focus { border-color: rgba(255,0,204,0.4); }

    #listeners-compact {
      font-size: 11px; color: rgba(255,255,255,0.3);
      margin-left: auto; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 260px;
    }
    .live-dot {
      display: inline-block; width: 6px; height: 6px;
      background: #ff00cc; border-radius: 50%; margin-right: 5px;
      box-shadow: 0 0 6px #ff00cc; animation: blink-dot 1.5s infinite;
      vertical-align: middle;
    }
    @keyframes blink-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    #library-list { overflow-y: auto; flex: 1; }
    #library-list::-webkit-scrollbar { width: 3px; }
    #library-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .lib-track {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 2px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .lib-track:hover { background: rgba(255,255,255,0.03); border-radius: 4px; }
    .lib-track-name {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 12px; color: rgba(255,255,255,0.7);
    }
    .lib-track-meta {
      font-size: 10px; color: rgba(255,255,255,0.25); flex-shrink: 0;
    }
    .lib-btn {
      font-size: 10px; padding: 2px 8px; border-radius: 7px; cursor: pointer;
      border: 1px solid; background: transparent; letter-spacing: 0.5px;
      transition: all 0.15s ease; flex-shrink: 0;
    }
    .lib-btn.load-a { border-color: rgba(255,0,204,0.35); color: rgba(255,0,204,0.6); }
    .lib-btn.load-a:hover { border-color: #ff00cc; color: #ff00cc; box-shadow: 0 0 6px rgba(255,0,204,0.4); }
    .lib-btn.load-b { border-color: rgba(0,224,255,0.35); color: rgba(0,224,255,0.6); }
    .lib-btn.load-b:hover { border-color: #00e0ff; color: #00e0ff; box-shadow: 0 0 6px rgba(0,224,255,0.4); }
    .lib-btn.active-a { border-color: #ff00cc; color: #ff00cc; }
    .lib-btn.active-b { border-color: #00e0ff; color: #00e0ff; }

    /* ── Auth overlay ── */
    #auth-gate {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      z-index: 100;
    }
    #auth-gate p { color: rgba(255,255,255,0.5); font-size: 16px; letter-spacing: 1px; }
    #auth-gate a {
      padding: 12px 36px; font-size: 16px; letter-spacing: 2px;
      background: transparent; border: 2px solid #ff00cc; color: #ff00cc;
      cursor: pointer; border-radius: 40px; text-decoration: none;
      box-shadow: 0 0 16px rgba(255,0,204,0.4); transition: box-shadow 0.2s;
    }
    #auth-gate a:hover { box-shadow: 0 0 30px rgba(255,0,204,0.7); }

    /* ── Disc layout ── */
    .deck-body {
      display: flex;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .disc-col {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .disc-canvas {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      cursor: grab;
      flex-shrink: 0;
      display: block;
      touch-action: none;
      user-select: none;
    }
    .disc-canvas:active { cursor: grabbing; }
    .disc-canvas.scratching { cursor: grabbing; }

    .controls-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      min-height: 0;
    }

    @media (max-width: 700px) {
      .decks-row { flex-direction: column; }
      .disc-canvas { width: 110px; height: 110px; }
    }

    /* ── Spotify Integration ── */
    .spotify-col {
      width: 150px; flex-shrink: 0;
      display: none; flex-direction: column;
      gap: 5px; padding: 2px 0;
      align-self: stretch;
    }
    .spotify-col-label {
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
      color: rgba(30,215,96,0.6); flex-shrink: 0;
    }
    #spotify-query {
      width: 100%;
      background: rgba(30,215,96,0.1);
      border: 1px solid rgba(30,215,96,0.5);
      border-radius: 8px; color: white;
      font-size: 11px; padding: 5px 8px;
      outline: none; box-sizing: border-box; flex-shrink: 0;
    }
    #spotify-query::placeholder { color: rgba(255,255,255,0.35); }
    #spotify-query:focus { border-color: #1ed760; box-shadow: 0 0 8px rgba(30,215,96,0.25); }
    #spotify-results { overflow-y: auto; flex: 1; min-height: 0; }
    #spotify-results::-webkit-scrollbar { width: 3px; }
    #spotify-results::-webkit-scrollbar-thumb { background: rgba(30,215,96,0.3); border-radius: 2px; }
    .sp-result { padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; border-radius: 4px; transition: background 0.15s; }
    .sp-result:hover { background: rgba(30,215,96,0.12); }
    .sp-result-name { font-size: 10px; color: rgba(255,255,255,0.85); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-result-artist { font-size: 9px; color: rgba(30,215,96,0.6); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #spotify-connect-btn {
      background: transparent;
      border: 1px solid rgba(30,215,96,0.4);
      color: rgba(30,215,96,0.8);
      border-radius: 14px; padding: 3px 8px;
      font-size: 10px; cursor: pointer;
      letter-spacing: 0.5px; transition: all 0.2s ease;
      white-space: nowrap; flex-shrink: 0;
    }
    #spotify-connect-btn:hover { border-color: #1ed760; color: #1ed760; box-shadow: 0 0 8px rgba(30,215,96,0.4); }
    #spotify-connect-btn.connected { border-color: rgba(30,215,96,0.6); color: rgba(30,215,96,0.9); }
  </style>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>

<!-- Auth gate (shown until verified) -->
<div id="auth-gate">
  <p>DJ Booth is members only</p>
  <a href="/login.html">Login to Enter</a>
</div>

<div id="bg-image"></div>
<div id="visual-bg"></div>

<!-- Header -->
<a href="/dj.html" id="backBtn" class="header-btn">← DJ Booth</a>
<a href="/profile.html" id="profileBtn" class="header-btn" style="display:none;">@user</a>
<a href="#" id="logoutBtn" class="header-btn" style="display:none;">Logout</a>

<!-- Hidden audio elements -->
<audio id="player-a" crossorigin="anonymous" preload="none"></audio>
<audio id="player-b" crossorigin="anonymous" preload="none"></audio>

<!-- DJ Layout -->
<div id="main">

  <div class="decks-row">

    <!-- DECK A -->
    <div class="deck-panel deck-a">
      <div class="deck-header-row">
        <div class="deck-label">Deck A</div>
        <span class="deck-bpm" id="bpm-a">-- BPM</span>
      </div>
      <div class="deck-track-title" id="title-a">No track loaded</div>
      <div class="deck-body">
        <div class="disc-col">
          <canvas class="disc-canvas" id="disc-a" width="150" height="150"></canvas>
        </div>
        <div class="controls-col">
          <canvas class="deck-waveform" id="wave-a"></canvas>
          <canvas class="deck-visualizer" id="vis-a"></canvas>
          <div class="deck-controls">
            <button class="ctrl-btn skip-btn" id="prev-a" title="Previous">⏮</button>
            <button class="ctrl-btn play-btn" id="play-a" title="Play / Pause">▶</button>
            <button class="ctrl-btn skip-btn" id="next-a" title="Next">⏭</button>
            <button class="vote-btn" id="vote-a" disabled>♥ <span id="vcount-a">0</span></button>
          </div>
          <div class="slider-section">
            <div class="slider-row">
              <span class="slider-label">Tempo</span>
              <input type="range" id="tempo-a" min="50" max="150" value="100" step="1">
              <span class="slider-val" id="tempo-val-a">0%</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">Volume</span>
              <input type="range" id="vol-a" min="0" max="100" value="80" step="1">
              <span class="slider-val" id="vol-val-a">80%</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">Bass</span>
              <input type="range" id="bass-a" min="-12" max="12" value="0" step="0.5">
              <span class="slider-val" id="bass-val-a">0 dB</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">Mid</span>
              <input type="range" id="mid-a" min="-12" max="12" value="0" step="0.5">
              <span class="slider-val" id="mid-val-a">0 dB</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">Treble</span>
              <input type="range" id="treble-a" min="-12" max="12" value="0" step="0.5">
              <span class="slider-val" id="treble-val-a">0 dB</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DECK B -->
    <div class="deck-panel deck-b">
      <div class="deck-header-row">
        <div class="deck-label">Deck B</div>
        <span class="deck-bpm" id="bpm-b">-- BPM</span>
        <button id="spotify-connect-btn">🎵 Spotify</button>
      </div>
      <div class="deck-track-title" id="title-b">No track loaded</div>
      <div class="deck-body">
        <div class="disc-col" id="disc-col-b">
          <canvas class="disc-canvas" id="disc-b" width="150" height="150"></canvas>
        </div>
        <!-- Spotify panel replaces disc-col when connected -->
        <div class="spotify-col" id="spotify-col-b">
          <span class="spotify-col-label">🎵 Spotify</span>
          <input type="text" id="spotify-query" placeholder="Search tracks...">
          <div id="spotify-results"></div>
        </div>
        <div class="controls-col">
          <canvas class="deck-waveform" id="wave-b"></canvas>
          <canvas class="deck-visualizer" id="vis-b"></canvas>
          <div class="deck-controls">
            <button class="ctrl-btn skip-btn" id="prev-b" title="Previous">⏮</button>
            <button class="ctrl-btn play-btn" id="play-b" title="Play / Pause">▶</button>
            <button class="ctrl-btn skip-btn" id="next-b" title="Next">⏭</button>
            <button class="vote-btn" id="vote-b" disabled>♥ <span id="vcount-b">0</span></button>
          </div>
          <div class="slider-section">

<script>
const API = "https://api.sikkmixx.com"
const token = localStorage.getItem("token")
let playlist = []
let audioContext = null
let currentUser = null
let myVotes = new Set()
let heartbeatInterval = null
let pollInterval = null

// Per-deck state
const DECKS = {
  a: {
    id: 'a', el: null,
    source: null, bassFilter: null, midFilter: null, trebleFilter: null,
    gainVol: null, gainXfade: null, analyser: null, dataArray: null, canvasCtx: null,
    currentIndex: -1, currentTrack: null, playCountedId: null, bassSmoothed: 0,
    discAngle: 0, scratching: false, scratchLastAngle: 0, scratchWasPlaying: false
  },
  b: {
    id: 'b', el: null,
    source: null, bassFilter: null, midFilter: null, trebleFilter: null,
    gainVol: null, gainXfade: null, analyser: null, dataArray: null, canvasCtx: null,
    currentIndex: -1, currentTrack: null, playCountedId: null, bassSmoothed: 0,
    discAngle: 0, scratching: false, scratchLastAngle: 0, scratchWasPlaying: false
  }
}

// Wire up audio elements immediately so src can be set before context is created
DECKS.a.el = document.getElementById('player-a')
DECKS.b.el = document.getElementById('player-b')

// ── Auth check ──────────────────────────────────────────────────
async function checkAuth() {
  if (!token) { window.location.href = '/login.html'; return false }
  try {
    const res = await fetch(`${API}/me`, { headers: { "Authorization": `Bearer ${token}` } })
    if (!res.ok) { localStorage.removeItem("token"); window.location.href = '/login.html'; return false }
    const me = await res.json()
    currentUser = me
    document.getElementById("profileBtn").textContent = `@${me.username}`
    document.getElementById("profileBtn").style.display = "inline-block"
    document.getElementById("logoutBtn").style.display = "inline-block"
    document.getElementById("auth-gate").style.display = "none"
    fetchMyVotes()
    return true
  } catch {
    window.location.href = '/login.html'
    return false
  }
}

document.getElementById("logoutBtn").addEventListener("click", e => {
  e.preventDefault()
  disconnectSpotify()
  localStorage.removeItem("token")
  window.location.href = '/'
})

// ── Audio init ───────────────────────────────────────────────────
function initAudio() {
  if (audioContext) return
  audioContext = new (window.AudioContext || window.webkitAudioContext)()

  for (const deck of Object.values(DECKS)) {
    deck.source = audioContext.createMediaElementSource(deck.el)

    deck.bassFilter = audioContext.createBiquadFilter()
    deck.bassFilter.type = 'lowshelf'
    deck.bassFilter.frequency.value = 100
    deck.bassFilter.gain.value = 0

    deck.midFilter = audioContext.createBiquadFilter()
    deck.midFilter.type = 'peaking'
    deck.midFilter.frequency.value = 1000
    deck.midFilter.Q.value = 1
    deck.midFilter.gain.value = 0

    deck.trebleFilter = audioContext.createBiquadFilter()
    deck.trebleFilter.type = 'highshelf'
    deck.trebleFilter.frequency.value = 8000
    deck.trebleFilter.gain.value = 0

    deck.gainVol = audioContext.createGain()
    deck.gainVol.gain.value = 0.8

    deck.gainXfade = audioContext.createGain()
    deck.gainXfade.gain.value = 1.0

    deck.analyser = audioContext.createAnalyser()
    deck.analyser.fftSize = 256
    deck.analyser.smoothingTimeConstant = 0.8

    deck.source
      .connect(deck.bassFilter)
      .connect(deck.midFilter)
      .connect(deck.trebleFilter)
      .connect(deck.gainVol)
      .connect(deck.gainXfade)
      .connect(deck.analyser)
      .connect(audioContext.destination)

    deck.dataArray = new Uint8Array(deck.analyser.frequencyBinCount)

    const canvas = document.getElementById(`vis-${deck.id}`)
    canvas.width = canvas.offsetWidth || 300
    canvas.height = canvas.offsetHeight || 52
    deck.canvasCtx = canvas.getContext('2d')
  }

  updateCrossfader(50)
  startVisualizerLoop()
}

// ── Crossfader ───────────────────────────────────────────────────
function updateCrossfader(pos) {
  const angle = (pos / 100) * Math.PI / 2
  if (DECKS.a.gainXfade) DECKS.a.gainXfade.gain.setTargetAtTime(Math.cos(angle), audioContext.currentTime, 0.05)
  if (DECKS.b.gainXfade) DECKS.b.gainXfade.gain.setTargetAtTime(Math.sin(angle), audioContext.currentTime, 0.05)
  if (DECKS.b.spotifyMode && spotifyPlayer) {
    const bGain = Math.sin(angle)
    const vol = parseInt(document.getElementById('vol-b').value) / 100
    spotifyPlayer.setVolume(bGain * vol).catch(() => {})
  }
}

document.getElementById('crossfader').addEventListener('input', e => {
  if (audioContext) updateCrossfader(parseInt(e.target.value))
})

// ── Visualizer ───────────────────────────────────────────────────
function drawDeck(deck, accentHue) {
  const canvas = document.getElementById(`vis-${deck.id}`)
  if (!deck.canvasCtx) return 0
  if (canvas.offsetWidth > 0 && canvas.width !== canvas.offsetWidth) {
    canvas.width = canvas.offsetWidth
    canvas.height = canvas.offsetHeight
  }
  deck.analyser.getByteFrequencyData(deck.dataArray)
  const ctx = deck.canvasCtx
  ctx.clearRect(0, 0, canvas.width, canvas.height)

  const bars = 32
  const step = Math.floor(deck.dataArray.length / bars)
  const barWidth = canvas.width / bars

  let bassSum = 0
  for (let i = 0; i < 8; i++) bassSum += deck.dataArray[i]
  deck.bassSmoothed = deck.bassSmoothed * 0.8 + (bassSum / 8) * 0.2

  for (let i = 0; i < bars; i++) {
    let sum = 0
    for (let j = 0; j < step; j++) sum += deck.dataArray[i * step + j]
    const norm = (sum / step) / 255
    const scaled = Math.pow(norm, 1.5) * canvas.height
    const hue = accentHue - norm * 60
    const bright = 50 + norm * 50
    ctx.fillStyle = `hsl(${hue}, 100%, ${bright}%)`
    ctx.shadowBlur = 14
    ctx.shadowColor = `hsl(${hue}, 100%, 65%)`
    ctx.fillRect(i * barWidth, canvas.height - scaled, barWidth - 2, scaled)
  }
  return deck.bassSmoothed / 255
}

function startVisualizerLoop() {
  const bg = document.getElementById('visual-bg')
  const RPM = 33.33
  const RAD_PER_SEC = (RPM / 60) * 2 * Math.PI  // ~3.49 rad/s
  let lastFrameTime = performance.now()

  function frame(now) {
    requestAnimationFrame(frame)
    const dt = Math.min(now - lastFrameTime, 100) // cap at 100ms to avoid jumps
    lastFrameTime = now

    // Advance disc rotation for non-scratching, playing decks
    for (const id of ['a', 'b']) {
      const deck = DECKS[id]
      if (deck.spotifyMode) continue  // disc hidden, skip
      if (!deck.scratching && deck.el && !deck.el.paused) {
        deck.discAngle += RAD_PER_SEC * (deck.el.playbackRate || 1) * (dt / 1000)
      }
      drawDisc(id)
    }

    const bA = drawDeck(DECKS.a, 300)
    const bB = DECKS.b.spotifyMode ? 0 : drawDeck(DECKS.b, 185)
    const combined = Math.max(bA, bB)
    document.body.style.transform = `scale(${1 + combined * 0.015})`
    const hue = 280 - combined * 90
    const bright = 6 + combined * 28
    bg.style.background = `radial-gradient(circle at center, hsla(${hue},100%,${bright}%,0.5), rgba(0,0,0,0.85))`

    // Waveforms
    drawWaveform('a')
    if (!DECKS.b.spotifyMode) drawWaveform('b')

    // BPM detection
    for (const id of ['a', 'b']) {
      const deck = DECKS[id]
      if (deck.spotifyMode || !deck.dataArray || !deck.beatDetector) continue
      deck.analyser.getByteFrequencyData(deck.dataArray)
      const beat = deck.beatDetector.process(deck.dataArray)
      const bpmEl = document.getElementById(`bpm-${id}`)
      if (deck.beatDetector.bpm > 0) {
        bpmEl.textContent = `${deck.beatDetector.bpm} BPM`
      }
      if (beat) {
        bpmEl.classList.add('beat')
        clearTimeout(deck.beatDetector.beatFlashTimeout)
        deck.beatDetector.beatFlashTimeout = setTimeout(() => bpmEl.classList.remove('beat'), 120)
      }
    }
  }
  frame()
}

// ── Track loading & playback ─────────────────────────────────────
function getTrackLabel(track) {
  if (!track) return ""
  const title = (track.original_name || "").replace(/\.(mp3|m4a|wav|ogg|flac|aac)$/i, "")
  const artist = (track.artist || "").trim()
  return artist ? `${artist} — ${title}` : title
}

function loadTrackToDeck(deckId, trackIndex) {
  const deck = DECKS[deckId]
  const track = playlist[trackIndex]
  if (!track || !deck.el) return
  deck.currentIndex = trackIndex
  deck.currentTrack = track
  deck.playCountedId = null
  deck.waveOffscreen = null  // clear old waveform

  // Reset BPM for new track
  if (deck.beatDetector) {
    deck.beatDetector.intervals = []
    deck.beatDetector.bpm = 0
    deck.beatDetector.lastBeatTime = 0
    document.getElementById(`bpm-${deckId}`).textContent = '-- BPM'
  }

  const url = `${API}/file/${encodeURIComponent(track.filename)}`
  deck.el.src = url
  document.getElementById(`title-${deckId}`).textContent = getTrackLabel(track)
  updateVoteBtn(deckId)
  buildLibrary(document.getElementById('library-search').value)
  sendHeartbeat()

  // Decode waveform in background
  decodeAndRenderWaveform(deckId, url)
}

function playDeck(deckId) {
  const deck = DECKS[deckId]
  if (deck.spotifyMode) { spotifyPlayer?.resume().catch(() => {}); return }
  if (!deck.el) return
  if (audioContext && audioContext.state === 'suspended') audioContext.resume()
  deck.el.play().catch(() => {})
}

function pauseDeck(deckId) {
  if (DECKS[deckId].spotifyMode) { spotifyPlayer?.pause().catch(() => {}); return }
  DECKS[deckId].el?.pause()
}

function toggleDeck(deckId) {
  if (deckId === 'b' && DECKS.b.spotifyMode) {
    const isPlaying = DECKS.b.spotifyState && !DECKS.b.spotifyState.paused
    if (isPlaying) pauseDeck(deckId)
    else playDeck(deckId)
    return
  }
  const el = DECKS[deckId].el
  if (!el) return
  if (!audioContext) initAudio()
  if (el.paused) playDeck(deckId)
  else pauseDeck(deckId)
}

function nextTrack(deckId) {
  if (deckId === 'b' && DECKS.b.spotifyMode) { spotifyPlayer?.nextTrack().catch(() => {}); return }
  const deck = DECKS[deckId]
  if (!playlist.length) return
  loadTrackToDeck(deckId, (deck.currentIndex + 1) % playlist.length)
  playDeck(deckId)
}

function prevTrack(deckId) {
  if (deckId === 'b' && DECKS.b.spotifyMode) { spotifyPlayer?.previousTrack().catch(() => {}); return }
  const deck = DECKS[deckId]
  if (!playlist.length) return
  const idx = deck.currentIndex <= 0 ? playlist.length - 1 : deck.currentIndex - 1
  loadTrackToDeck(deckId, idx)
  playDeck(deckId)
}

function updatePlayBtn(deckId) {
  const btn = document.getElementById(`play-${deckId}`)
  const playing = DECKS[deckId].el?.paused === false
  btn.textContent = playing ? '⏸' : '▶'
  btn.classList.toggle('is-playing', playing)
}

// ── Transport event listeners ─────────────────────────────────────
;['a', 'b'].forEach(id => {
  document.getElementById(`prev-${id}`).addEventListener('click', () => prevTrack(id))
  document.getElementById(`play-${id}`).addEventListener('click', () => toggleDeck(id))
  document.getElementById(`next-${id}`).addEventListener('click', () => nextTrack(id))

  const el = DECKS[id].el
  el.addEventListener('play',  () => updatePlayBtn(id))
  el.addEventListener('pause', () => updatePlayBtn(id))
  el.addEventListener('ended', () => nextTrack(id))

  el.addEventListener('timeupdate', () => {
    const deck = DECKS[id]
    if (!el.duration || !deck.currentTrack) return
    if ((el.duration - el.currentTime) <= 60 && deck.playCountedId !== deck.currentTrack.id) {
      deck.playCountedId = deck.currentTrack.id
      fetch(`${API}/track-played`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: deck.currentTrack.id })
      }).catch(() => {})
    }
  })
})

// ── Sliders ───────────────────────────────────────────────────────
function setupSliders(id) {
  const deck = DECKS[id]

  const tempo = document.getElementById(`tempo-${id}`)
  const tempoVal = document.getElementById(`tempo-val-${id}`)
  tempo.addEventListener('input', () => {
    const pct = parseInt(tempo.value) - 100
    tempoVal.textContent = `${pct > 0 ? '+' : ''}${pct}%`
    if (deck.el) deck.el.playbackRate = parseInt(tempo.value) / 100
  })

  const vol = document.getElementById(`vol-${id}`)
  const volVal = document.getElementById(`vol-val-${id}`)
  vol.addEventListener('input', () => {
    const v = parseInt(vol.value)
    volVal.textContent = `${v}%`
    if (deck.spotifyMode && spotifyPlayer) {
      const xf = parseInt(document.getElementById('crossfader').value)
      const angle = (xf / 100) * Math.PI / 2
      spotifyPlayer.setVolume(Math.sin(angle) * v / 100).catch(() => {})
    } else if (deck.gainVol) {
      deck.gainVol.gain.setTargetAtTime(v / 100, audioContext.currentTime, 0.02)
    }
  })

  const bass = document.getElementById(`bass-${id}`)
  const bassVal = document.getElementById(`bass-val-${id}`)
  bass.addEventListener('input', () => {
    const db = parseFloat(bass.value)
    bassVal.textContent = `${db > 0 ? '+' : ''}${db} dB`
    if (deck.bassFilter) deck.bassFilter.gain.setTargetAtTime(db, audioContext.currentTime, 0.02)
  })

  const mid = document.getElementById(`mid-${id}`)
  const midVal = document.getElementById(`mid-val-${id}`)
  mid.addEventListener('input', () => {
    const db = parseFloat(mid.value)
    midVal.textContent = `${db > 0 ? '+' : ''}${db} dB`
    if (deck.midFilter) deck.midFilter.gain.setTargetAtTime(db, audioContext.currentTime, 0.02)
  })

  const treble = document.getElementById(`treble-${id}`)
  const trebleVal = document.getElementById(`treble-val-${id}`)
  treble.addEventListener('input', () => {
    const db = parseFloat(treble.value)
    trebleVal.textContent = `${db > 0 ? '+' : ''}${db} dB`
    if (deck.trebleFilter) deck.trebleFilter.gain.setTargetAtTime(db, audioContext.currentTime, 0.02)
  })
}

setupSliders('a')
setupSliders('b')

// ── Votes ─────────────────────────────────────────────────────────
async function fetchMyVotes() {
  if (!token) return
  try {
    const res = await fetch(`${API}/my-votes`, { headers: { "Authorization": `Bearer ${token}` } })
    if (res.ok) { myVotes = new Set(await res.json()); updateVoteBtn('a'); updateVoteBtn('b') }
  } catch {}
}

function updateVoteBtn(deckId) {
  const deck = DECKS[deckId]
  const btn = document.getElementById(`vote-${deckId}`)
  const countEl = document.getElementById(`vcount-${deckId}`)
  if (!deck.currentTrack) return
  countEl.textContent = deck.currentTrack.vote_count || 0
  if (!currentUser) { btn.disabled = true; btn.classList.remove('voted'); return }
  btn.disabled = false
  btn.classList.toggle('voted', myVotes.has(deck.currentTrack.id))
}

async function voteDeck(deckId) {
  const deck = DECKS[deckId]
  if (!deck.currentTrack || !currentUser) return
  try {
    const res = await fetch(`${API}/vote`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ track_id: deck.currentTrack.id })
    })
    if (!res.ok) return
    const data = await res.json()
    if (data.voted) { myVotes.add(deck.currentTrack.id); deck.currentTrack.vote_count = (deck.currentTrack.vote_count || 0) + 1 }
    else { myVotes.delete(deck.currentTrack.id); deck.currentTrack.vote_count = Math.max(0, (deck.currentTrack.vote_count || 0) - 1) }
    updateVoteBtn(deckId)
    buildLibrary(document.getElementById('library-search').value)
  } catch {}
}

document.getElementById('vote-a').addEventListener('click', () => voteDeck('a'))
document.getElementById('vote-b').addEventListener('click', () => voteDeck('b'))

// ── Library ───────────────────────────────────────────────────────
function buildLibrary(filter = '') {
  const q = filter.toLowerCase()
  const tracks = q ? playlist.filter(t => getTrackLabel(t).toLowerCase().includes(q)) : playlist

  document.getElementById('library-list').innerHTML = tracks.map(track => {
    const idx = playlist.indexOf(track)
    const label = getTrackLabel(track)
    const onA = DECKS.a.currentIndex === idx
    const onB = DECKS.b.currentIndex === idx
    const nameColor = onA ? 'color:#ff00cc;' : onB ? 'color:#00e0ff;' : ''
    return `
      <div class="lib-track">
        <span class="lib-track-name" style="${nameColor}">${label}</span>
        <span class="lib-track-meta">♥${track.vote_count||0} ▶${track.play_count||0}</span>
        <button class="lib-btn load-a${onA?' active-a':''}" data-index="${idx}">▶ A</button>
        <button class="lib-btn load-b${onB?' active-b':''}" data-index="${idx}">▶ B</button>
      </div>`
  }).join('')

  document.getElementById('library-list').querySelectorAll('.load-a').forEach(btn =>
    btn.addEventListener('click', () => loadTrackToDeck('a', parseInt(btn.dataset.index)))
  )
  document.getElementById('library-list').querySelectorAll('.load-b').forEach(btn =>
    btn.addEventListener('click', () => loadTrackToDeck('b', parseInt(btn.dataset.index)))
  )
}

document.getElementById('library-search').addEventListener('input', e => buildLibrary(e.target.value))

// ── Presence ──────────────────────────────────────────────────────
let sessionId = sessionStorage.getItem("session_id")
if (!sessionId) { sessionId = crypto.randomUUID(); sessionStorage.setItem("session_id", sessionId) }

async function sendHeartbeat() {
  const xf = parseInt(document.getElementById('crossfader').value)
  const deckId = xf <= 50 ? 'a' : 'b'
  const deck = DECKS[deckId]
  if (!deck.currentTrack) return
  try {
    await fetch(`${API}/listening`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: currentUser ? `user_${currentUser.id}` : sessionId,
        username: currentUser ? `@${currentUser.username}` : 'Guest',
        track_name: getTrackLabel(deck.currentTrack)
      })
    })
  } catch {}
}

async function pollListeners() {
  try {
    const res = await fetch(`${API}/listeners`)
    if (!res.ok) return
    const listeners = await res.json()
    const el = document.getElementById('listeners-compact')
    if (!listeners.length) { el.textContent = ''; return }
    el.innerHTML = `<span class="live-dot"></span>${listeners.map(l => l.username).join(', ')}`
  } catch {}
}

function startPresence() {
  if (heartbeatInterval) return
  sendHeartbeat(); pollListeners()
  heartbeatInterval = setInterval(sendHeartbeat, 15000)
  pollInterval = setInterval(pollListeners, 15000)
}

// ── BPM Detection ────────────────────────────────────────────────
class BeatDetector {
  constructor() {
    this.lastBeatTime = 0
    this.intervals = []
    this.energyHistory = new Array(60).fill(0)  // ~1.4s rolling window
    this.bpm = 0
    this.beatFlashTimeout = null
  }

  process(dataArray) {
    // Only look at first 4 bins (~0-688Hz) — kick/sub-bass only
    let energy = 0
    for (let i = 0; i < 4; i++) energy += dataArray[i] ** 2
    energy = Math.sqrt(energy / 4)

    this.energyHistory.push(energy)
    this.energyHistory.shift()
    const avg = this.energyHistory.reduce((a, b) => a + b) / this.energyHistory.length

    const now = performance.now()
    const gap = now - this.lastBeatTime

    // Min 375ms between beats = max ~160 BPM, avoids detecting subdivisions
    if (energy > avg * 1.6 && gap > 375) {
      if (this.lastBeatTime > 0 && gap < 2000) {
        this.intervals.push(gap)
        if (this.intervals.length > 12) this.intervals.shift()
        // Use median instead of mean — more stable against outliers
        const sorted = [...this.intervals].sort((a, b) => a - b)
        const median = sorted[Math.floor(sorted.length / 2)]
        this.bpm = Math.round(60000 / median)
      }
      this.lastBeatTime = now
      return true
    }
    return false
  }
}

// One detector per deck, stored on the deck object
DECKS.a.beatDetector = new BeatDetector()
DECKS.b.beatDetector = new BeatDetector()

// ── Waveform ──────────────────────────────────────────────────────
// Each deck stores an offscreen canvas with the static waveform drawn once
async function decodeAndRenderWaveform(deckId, url) {
  const deck = DECKS[deckId]
  const canvas = document.getElementById(`wave-${deckId}`)
  const accentColor = deckId === 'a' ? '#ff00cc' : '#00e0ff'
  const dimColor   = deckId === 'a' ? 'rgba(255,0,204,0.55)' : 'rgba(0,224,255,0.55)'

  // Clear to loading state
  const ctx = canvas.getContext('2d')
  canvas.width = canvas.offsetWidth || 400
  canvas.height = canvas.offsetHeight || 52
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  ctx.fillStyle = 'rgba(255,255,255,0.08)'
  ctx.font = '10px Segoe UI'
  ctx.textAlign = 'center'
  ctx.fillText('loading waveform...', canvas.width / 2, canvas.height / 2 + 4)

  try {
    const response = await fetch(url)
    const arrayBuffer = await response.arrayBuffer()
    // Use a temp AudioContext for decoding if main one not ready yet
    const ctx2 = audioContext || new (window.AudioContext || window.webkitAudioContext)()
    const audioBuffer = await ctx2.decodeAudioData(arrayBuffer)

    // Build offscreen canvas
    const offscreen = document.createElement('canvas')
    offscreen.width  = canvas.offsetWidth  || 400
    offscreen.height = canvas.offsetHeight || 52
    const oc = offscreen.getContext('2d')
    const data = audioBuffer.getChannelData(0)
    const w = offscreen.width, h = offscreen.height
    const mid = h / 2
    const step = Math.ceil(data.length / w)

    oc.clearRect(0, 0, w, h)

    // Draw waveform bars (dim by default, bright played portion drawn each frame)
    for (let x = 0; x < w; x++) {
      let min = 0, max = 0
      for (let i = 0; i < step; i++) {
        const s = data[x * step + i] || 0
        if (s < min) min = s
        if (s > max) max = s
      }
      oc.fillStyle = dimColor
      oc.fillRect(x, mid + min * mid * 0.95, 1, Math.max(1, (max - min) * mid * 0.95))
    }

    deck.waveOffscreen = offscreen
    deck.waveColor = accentColor
    deck.waveDim = dimColor
  } catch (e) {
    // Waveform failed — draw placeholder
    const ctx = canvas.getContext('2d')
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    deck.waveOffscreen = null
  }
}

function drawWaveform(deckId) {
  const deck = DECKS[deckId]
  const canvas = document.getElementById(`wave-${deckId}`)
  const ctx = canvas.getContext('2d')
  if (canvas.offsetWidth > 0 && (canvas.width !== canvas.offsetWidth || canvas.height !== canvas.offsetHeight)) {
    canvas.width = canvas.offsetWidth
    canvas.height = canvas.offsetHeight
  }

  const w = canvas.width, h = canvas.height

  ctx.clearRect(0, 0, w, h)

  if (!deck.waveOffscreen) return

  // Draw dim full waveform
  ctx.drawImage(deck.waveOffscreen, 0, 0, w, h)

  const el = deck.el
  if (!el || !el.duration) return

  const progress = el.currentTime / el.duration
  const playedX = Math.floor(progress * w)

  // Tint played region with accent color
  ctx.save()
  ctx.globalCompositeOperation = 'source-atop'
  ctx.fillStyle = deck.id === 'a' ? 'rgba(255,0,204,0.75)' : 'rgba(0,224,255,0.75)'
  ctx.fillRect(0, 0, playedX, h)
  ctx.restore()

  // Playhead line
  ctx.fillStyle = deck.id === 'a' ? '#ff00cc' : '#00e0ff'
  ctx.shadowBlur = 18
  ctx.shadowColor = deck.id === 'a' ? '#ff00cc' : '#00e0ff'
  ctx.fillRect(playedX - 1, 0, 2, h)
  ctx.shadowBlur = 0

  // Time remaining label
  const remaining = el.duration - el.currentTime
  const mins = Math.floor(remaining / 60)
  const secs = Math.floor(remaining % 60).toString().padStart(2, '0')
  ctx.fillStyle = 'rgba(255,255,255,0.4)'
  ctx.font = '9px Segoe UI'
  ctx.textAlign = 'right'
  ctx.fillText(`-${mins}:${secs}`, w - 4, h - 3)
}

// Seeking by click or drag on waveform
;['a', 'b'].forEach(id => {
  const canvas = document.getElementById(`wave-${id}`)
  let seeking = false

  function seekTo(e) {
    const deck = DECKS[id]
    if (!deck.el || !deck.el.duration) return
    const rect = canvas.getBoundingClientRect()
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left
    deck.el.currentTime = Math.max(0, Math.min(1, x / rect.width)) * deck.el.duration
  }

  canvas.addEventListener('mousedown',  e => { seeking = true; seekTo(e) })
  canvas.addEventListener('mousemove',  e => { if (seeking) seekTo(e) })
  canvas.addEventListener('mouseup',    () => { seeking = false })
  canvas.addEventListener('mouseleave', () => { seeking = false })
  canvas.addEventListener('touchstart', e => { e.preventDefault(); seekTo(e) }, { passive: false })
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); seekTo(e) }, { passive: false })
})

// ── Disc drawing ─────────────────────────────────────────────────
function drawDisc(deckId) {
  const deck = DECKS[deckId]
  const canvas = document.getElementById(`disc-${deckId}`)
  if (!canvas) return
  const ctx = canvas.getContext('2d')
  const w = canvas.width, h = canvas.height
  const cx = w / 2, cy = h / 2
  const r = Math.min(w, h) / 2 - 2
  const accent = deckId === 'a' ? '#ff00cc' : '#00e0ff'
  const accentDim = deckId === 'a' ? 'rgba(255,0,204,0.35)' : 'rgba(0,224,255,0.35)'

  ctx.clearRect(0, 0, w, h)
  ctx.save()
  ctx.translate(cx, cy)
  ctx.rotate(deck.discAngle)

  // Vinyl body
  ctx.beginPath()
  ctx.arc(0, 0, r, 0, Math.PI * 2)
  ctx.fillStyle = '#0e0e0e'
  ctx.fill()

  // Grooves
  for (let i = 4; i <= 22; i++) {
    const gr = r * (0.32 + i * 0.031)
    if (gr >= r) break
    ctx.beginPath()
    ctx.arc(0, 0, gr, 0, Math.PI * 2)
    ctx.strokeStyle = `rgba(255,255,255,${0.025 + i * 0.004})`
    ctx.lineWidth = 0.6
    ctx.stroke()
  }

  // Sheen highlight (stays relative to canvas, not rotation — but for simplicity rotate with disc)
  const sheen = ctx.createRadialGradient(-r * 0.25, -r * 0.25, 0, 0, 0, r)
  sheen.addColorStop(0,   'rgba(255,255,255,0.09)')
  sheen.addColorStop(0.4, 'rgba(255,255,255,0.02)')
  sheen.addColorStop(1,   'rgba(0,0,0,0.35)')
  ctx.beginPath()
  ctx.arc(0, 0, r, 0, Math.PI * 2)
  ctx.fillStyle = sheen
  ctx.fill()

  // Center label
  const lr = r * 0.30
  ctx.beginPath()
  ctx.arc(0, 0, lr, 0, Math.PI * 2)
  ctx.fillStyle = accent
  ctx.fill()

  // Label inner gradient
  const lg = ctx.createRadialGradient(-lr * 0.3, -lr * 0.3, 0, 0, 0, lr)
  lg.addColorStop(0, 'rgba(255,255,255,0.25)')
  lg.addColorStop(1, 'rgba(0,0,0,0.4)')
  ctx.beginPath()
  ctx.arc(0, 0, lr, 0, Math.PI * 2)
  ctx.fillStyle = lg
  ctx.fill()

  // Label text
  ctx.fillStyle = 'rgba(0,0,0,0.75)'
  ctx.font = `bold ${Math.round(lr * 0.32)}px Segoe UI`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('SIKKMIXX', 0, 0)

  // Center hole
  ctx.beginPath()
  ctx.arc(0, 0, r * 0.038, 0, Math.PI * 2)
  ctx.fillStyle = '#000'
  ctx.fill()

  ctx.restore()

  // Outer ring glow when scratching
  if (deck.scratching) {
    ctx.save()
    ctx.beginPath()
    ctx.arc(cx, cy, r + 1, 0, Math.PI * 2)
    ctx.strokeStyle = accent
    ctx.lineWidth = 2
    ctx.shadowBlur = 14
    ctx.shadowColor = accent
    ctx.stroke()
    ctx.restore()
  }

  // Tonearm indicator (static, not rotating) — small dot at 4 o'clock
  ctx.save()
  ctx.translate(cx, cy)
  const taDist = r * 0.72
  const taAngle = Math.PI * 0.22
  ctx.beginPath()
  ctx.arc(Math.cos(taAngle) * taDist, Math.sin(taAngle) * taDist, 3, 0, Math.PI * 2)
  ctx.fillStyle = accentDim
  ctx.fill()
  ctx.restore()
}

// ── Scratch ────────────────────────────────────────────────────────
function getScratchAngle(e, canvas) {
  const rect = canvas.getBoundingClientRect()
  const cx = rect.left + rect.width  / 2
  const cy = rect.top  + rect.height / 2
  const src = e.touches ? e.touches[0] : e
  return Math.atan2(src.clientY - cy, src.clientX - cx)
}

;['a', 'b'].forEach(id => {
  const canvas = document.getElementById(`disc-${id}`)
  const deck   = DECKS[id]

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault()
    canvas.setPointerCapture(e.pointerId)   // lock events to this canvas until release
    if (!audioContext) initAudio()
    deck.scratching = true
    deck.scratchWasPlaying = !deck.el.paused
    deck.scratchLastAngle = getScratchAngle(e, canvas)
    deck.el.pause()
    canvas.classList.add('scratching')
  })

  canvas.addEventListener('pointermove', e => {
    if (!deck.scratching) return
    e.preventDefault()
    const angle = getScratchAngle(e, canvas)
    let delta = angle - deck.scratchLastAngle
    if (delta >  Math.PI) delta -= 2 * Math.PI
    if (delta < -Math.PI) delta += 2 * Math.PI
    deck.scratchLastAngle = angle
    deck.discAngle += delta
    if (deck.el && deck.el.duration) {
      deck.el.currentTime = Math.max(0, Math.min(
        deck.el.duration,
        deck.el.currentTime + (delta / (2 * Math.PI)) * 1.8
      ))
    }
  })

  function endScratch() {
    if (!deck.scratching) return
    deck.scratching = false
    canvas.classList.remove('scratching')
    if (deck.scratchWasPlaying) playDeck(id)
  }

  canvas.addEventListener('pointerup',     endScratch)
  canvas.addEventListener('pointercancel', endScratch)
})

// ── Bootstrap ─────────────────────────────────────────────────────
async function init() {
  // Handle Spotify OAuth callback before auth check (page may redirect back with ?code=)
  const urlParams = new URLSearchParams(window.location.search)
  const spCode = urlParams.get('code')
  const spError = urlParams.get('error')
  if (spError) window.history.replaceState({}, '', '/dj-spotify.html')
  if (spCode && !spError) {
    console.log('[Spotify] OAuth code found, exchanging...')
    await exchangeSpotifyCode(spCode)
    if (localStorage.getItem('sp_token')) {
      console.log('[Spotify] token present, showing panel')
      setSpotifyMode(true)
    } else {
      console.warn('[Spotify] token exchange completed but no token in localStorage')
    }
    if (spotifySDKReady && !spotifyPlayer) initSpotifyPlayer()
  } else if (localStorage.getItem('sp_token') || localStorage.getItem('sp_refresh')) {
    console.log('[Spotify] existing tokens found, showing panel')
    const tok = await getSpotifyToken()
    if (tok) setSpotifyMode(true)
    else console.warn('[Spotify] token refresh failed')
  }

  const ok = await checkAuth()
  if (!ok) return

  try {
    const res = await fetch(`${API}/public-tracks`)
    playlist = await res.json()
  } catch { return }

  if (!playlist.length) return

  buildLibrary()

  // Load random tracks to each deck (different ones if possible)
  const idxA = Math.floor(Math.random() * playlist.length)
  let idxB = Math.floor(Math.random() * playlist.length)
  if (playlist.length > 1) while (idxB === idxA) idxB = Math.floor(Math.random() * playlist.length)

  loadTrackToDeck('a', idxA)
  loadTrackToDeck('b', idxB)

  // Init audio on first user gesture (play button or load-to-deck click)
  document.getElementById('library-list').addEventListener('click', () => {
    if (!audioContext) initAudio()
  }, { once: true })

  startPresence()
  // Spotify player initialized by window.onSpotifyWebPlaybackSDKReady when SDK is ready
}

// ── Spotify Integration ───────────────────────────────────────────
const SPOTIFY_CLIENT_ID = 'a03f77c61e2e4f8cabfb957532080a0a'
const SPOTIFY_REDIRECT_URI = window.location.origin + '/dj-spotify.html'
const SPOTIFY_SCOPES = 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state'

let spotifyPlayer = null
let spotifyDeviceId = null
let spotifyCurrentTrackId = null
DECKS.b.spotifyMode = false

init()
DECKS.b.spotifyState = null

// PKCE helpers
function generateCodeVerifier() {
  const arr = new Uint8Array(32)
  crypto.getRandomValues(arr)
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier)
  const digest = await crypto.subtle.digest('SHA-256', data)
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
}

async function connectSpotify() {
  const verifier = generateCodeVerifier()
  const challenge = await generateCodeChallenge(verifier)
  localStorage.setItem('sp_verifier', verifier)
  const params = new URLSearchParams({
    client_id: SPOTIFY_CLIENT_ID,
    response_type: 'code',
    redirect_uri: SPOTIFY_REDIRECT_URI,
    scope: SPOTIFY_SCOPES,
    code_challenge_method: 'S256',
    code_challenge: challenge
  })
  window.location.href = `https://accounts.spotify.com/authorize?${params}`
}

async function exchangeSpotifyCode(code) {
  const verifier = localStorage.getItem('sp_verifier')
  if (!verifier) return null
  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_verifier: verifier
      })
    })
    const data = await res.json()
    console.log('[Spotify] token exchange response:', data)
    if (data.access_token) {
      localStorage.setItem('sp_token', data.access_token)
      if (data.refresh_token) localStorage.setItem('sp_refresh', data.refresh_token)
      localStorage.setItem('sp_expiry', Date.now() + data.expires_in * 1000)
      localStorage.removeItem('sp_verifier')
      window.history.replaceState({}, '', '/dj-spotify.html')
      console.log('[Spotify] token stored successfully')
      return data.access_token
    } else {
      console.error('[Spotify] token exchange failed — no access_token in response:', data)
    }
  } catch (e) { console.error('Spotify token exchange failed:', e) }
  return null
}

async function getSpotifyToken() {
  const expiry = parseInt(localStorage.getItem('sp_expiry') || '0')
  if (Date.now() < expiry - 60000) return localStorage.getItem('sp_token')
  return refreshSpotifyToken()
}

async function refreshSpotifyToken() {
  const rt = localStorage.getItem('sp_refresh')
  if (!rt) return null
  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'refresh_token',
        refresh_token: rt
      })
    })
    const data = await res.json()
    if (data.access_token) {
      localStorage.setItem('sp_token', data.access_token)
      localStorage.setItem('sp_expiry', Date.now() + data.expires_in * 1000)
      if (data.refresh_token) localStorage.setItem('sp_refresh', data.refresh_token)
      return data.access_token
    }
  } catch {}
  localStorage.removeItem('sp_token')
  localStorage.removeItem('sp_refresh')
  return null
}

// Show status in Deck B's title and connect button
function spStatus(msg) {
  document.getElementById('title-b').textContent = msg
}

function showSpotifyPanel(connecting) {
  // Swap disc for search panel only — keep all other controls intact
  document.getElementById('disc-col-b').style.display = 'none'
  document.getElementById('spotify-col-b').style.display = 'flex'
  const btn = document.getElementById('spotify-connect-btn')
  btn.textContent = connecting ? '🎵 Connecting...' : '🎵 Connected'
  btn.classList.toggle('connected', !connecting)
  btn.onclick = disconnectSpotify
  document.getElementById('spotify-query').disabled = connecting
  document.getElementById('spotify-query').placeholder = connecting ? 'Connecting...' : 'Search tracks...'
}

function setSpotifyMode(enabled) {
  DECKS.b.spotifyMode = enabled
  if (enabled) {
    showSpotifyPanel(false)
    DECKS.b.el.volume = 0
    DECKS.b.el.pause()
    spStatus('Type above to search Spotify')
    document.getElementById('bpm-b').textContent = '-- BPM'
    document.getElementById('play-b').textContent = '▶'
    document.getElementById('play-b').classList.remove('is-playing')
  } else {
    document.getElementById('disc-col-b').style.display = ''
    document.getElementById('spotify-col-b').style.display = 'none'
    const btn = document.getElementById('spotify-connect-btn')
    btn.textContent = '🎵 Spotify'
    btn.classList.remove('connected')
    btn.onclick = connectSpotify
    DECKS.b.el.volume = 1
  }
}

function disconnectSpotify() {
  if (spotifyPlayer) { spotifyPlayer.disconnect(); spotifyPlayer = null }
  spotifyDeviceId = null
  spotifyCurrentTrackId = null
  localStorage.removeItem('sp_token')
  localStorage.removeItem('sp_refresh')
  localStorage.removeItem('sp_expiry')
  setSpotifyMode(false)
  document.getElementById('title-b').textContent = 'No track loaded'
  document.getElementById('bpm-b').textContent = '-- BPM'
}

async function initSpotifyPlayer() {
  if (spotifyPlayer) return  // already initialized
  const token = await getSpotifyToken()
  if (!token) { spStatus('No Spotify token — click 🎵 Spotify to reconnect'); return }

  // Ensure the search panel is visible (init() normally handles this, but SDK may fire first)
  if (!DECKS.b.spotifyMode) setSpotifyMode(true)
  spStatus('Connecting Spotify player...')
  document.getElementById('spotify-query').disabled = true
  document.getElementById('spotify-query').placeholder = 'Connecting...'

  spotifyPlayer = new Spotify.Player({
    name: 'SiKKMiXX Deck B',
    getOAuthToken: async cb => { cb(await getSpotifyToken() || '') },
    volume: 0.8
  })

  spotifyPlayer.addListener('ready', ({ device_id }) => {
    spotifyDeviceId = device_id
    setSpotifyMode(true)
  })

  spotifyPlayer.addListener('not_ready', () => {
    spotifyDeviceId = null
    spStatus('Spotify player went offline')
  })

  spotifyPlayer.addListener('player_state_changed', state => {
    if (!state) return
    DECKS.b.spotifyState = state
    const paused = state.paused
    const btn = document.getElementById('play-b')
    btn.textContent = paused ? '▶' : '⏸'
    btn.classList.toggle('is-playing', !paused)
    const track = state.track_window?.current_track
    if (track && track.id !== spotifyCurrentTrackId) {
      spotifyCurrentTrackId = track.id
      const artist = track.artists?.[0]?.name || ''
      document.getElementById('title-b').textContent = artist ? `${artist} — ${track.name}` : track.name
      fetchSpotifyBPM(track.id)
    }
  })

  spotifyPlayer.addListener('initialization_error', ({ message }) => spStatus(`Init error: ${message}`))
  spotifyPlayer.addListener('authentication_error', ({ message }) => {
    spStatus(`Auth error — disconnect and reconnect Spotify`)
    spotifyPlayer = null
    // Keep search panel visible; re-enable input for searching
    document.getElementById('spotify-query').disabled = false
    document.getElementById('spotify-query').placeholder = 'Search tracks...'
  })
  spotifyPlayer.addListener('account_error', ({ message }) => {
    spStatus('Spotify Premium required for playback — search still available')
    spotifyPlayer = null
    // Keep search panel visible; re-enable input for searching
    document.getElementById('spotify-query').disabled = false
    document.getElementById('spotify-query').placeholder = 'Search tracks...'
  })
  spotifyPlayer.addListener('playback_error', ({ message }) => spStatus(`Playback error: ${message}`))

  const ok = await spotifyPlayer.connect()
  if (!ok) spStatus('Spotify connection failed — try disconnecting and reconnecting')
}

// Spotify SDK calls this when it is internally ready to create players
let spotifySDKReady = false
window.onSpotifyWebPlaybackSDKReady = () => {
  spotifySDKReady = true
  if ((localStorage.getItem('sp_token') || localStorage.getItem('sp_refresh')) && !spotifyPlayer) {
    initSpotifyPlayer()
  }
}

// Connect button wired up here (onclick overridden by setSpotifyMode when connected)
document.getElementById('spotify-connect-btn').onclick = connectSpotify

// Spotify search with debounce
let spSearchTimer = null
document.getElementById('spotify-query').addEventListener('input', e => {
  clearTimeout(spSearchTimer)
  spSearchTimer = setTimeout(() => searchSpotify(e.target.value), 400)
})

async function searchSpotify(query) {
  const resultsEl = document.getElementById('spotify-results')
  if (!query.trim()) { resultsEl.innerHTML = ''; return }
  const token = await getSpotifyToken()
  if (!token) return
  try {
    const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=10`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    if (!res.ok) return
    const data = await res.json()
    const tracks = data.tracks?.items || []
    resultsEl.innerHTML = tracks.map(t => `
      <div class="sp-result" data-uri="${t.uri}">
        <span class="sp-result-name">${t.name}</span>
        <span class="sp-result-artist">${t.artists.map(a => a.name).join(', ')}</span>
      </div>`).join('')
    resultsEl.querySelectorAll('.sp-result').forEach(el => {
      el.addEventListener('click', () => {
        playSpotifyTrack(el.dataset.uri)
        document.getElementById('spotify-query').value = ''
        resultsEl.innerHTML = ''
      })
    })
  } catch {}
}

async function playSpotifyTrack(uri) {
  const token = await getSpotifyToken()
  if (!token || !spotifyDeviceId) return
  try {
    await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${spotifyDeviceId}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uris: [uri] })
    })
  } catch {}
}

async function fetchSpotifyBPM(trackId) {
  const token = await getSpotifyToken()
  if (!token) return
  try {
    const res = await fetch(`https://api.spotify.com/v1/audio-features/${trackId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    const data = await res.json()
    if (data.tempo) document.getElementById('bpm-b').textContent = `${Math.round(data.tempo)} BPM`
  } catch {}
}
